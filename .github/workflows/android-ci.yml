name: Android CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

defaults:
  run:
    working-directory: android

jobs:
  build:
    name: Lint, detekt, unit tests, debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Android Lint
        run: ./gradlew --no-daemon :app:lintDebug

      - name: detekt
        run: ./gradlew --no-daemon :app:detekt

      - name: Unit tests + JaCoCo report
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:jacocoTestReport

      - name: Assemble debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pricegrab-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload unit-test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-${{ github.sha }}
          path: |
            android/app/build/reports/tests/testDebugUnitTest/
            android/app/build/reports/jacoco/jacocoTestReport/
            android/app/build/reports/detekt/
            android/app/build/reports/lint-results-debug.html
          if-no-files-found: warn
          retention-days: 14

  instrumented-tests:
    name: Instrumented tests (API 34 ATD)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Runs on every PR and every push to main now that US1 has real
    # Compose UI tests worth gating on. The `skip-instrumented` label is
    # an escape hatch for PRs that touch nothing the emulator could catch
    # (docs, CI tweaks) and want faster feedback.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       !contains(github.event.pull_request.labels.*.name, 'skip-instrumented'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run connectedCheck on API 34 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: aosp_atd
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          working-directory: android
          script: ./gradlew --no-daemon :app:connectedDebugAndroidTest

      - name: Upload instrumented-test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-${{ github.sha }}
          path: android/app/build/reports/androidTests/
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Signed release APK
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${SIGNING_KEYSTORE_BASE64}" ]; then
            echo "::error::SIGNING_KEYSTORE_BASE64 secret is not set. Cannot build a signed release."
            exit 1
          fi
          echo "${SIGNING_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release.jks"
          echo "KEYSTORE_PATH=${RUNNER_TEMP}/release.jks" >> "${GITHUB_ENV}"

      - name: Assemble signed release APK
        env:
          PRICEGRAB_KEYSTORE: ${{ env.KEYSTORE_PATH }}
          PRICEGRAB_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          PRICEGRAB_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          PRICEGRAB_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload signed APK to the release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
